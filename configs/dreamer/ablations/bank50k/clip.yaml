schema_version: dreamer_config_v1
defaults:
  run_name: dreamer_bank50k_clip_2m
  output_root: artifacts/dreamer/ablations/bank50k/clip
paths:
  catalog_path: catalog/e350_core_catalog.yaml
  persona_config_path: configs/personas_v2.yaml
  persona_bank_path: datasets/persona_bank/bank50k_s123/persona_bank.jsonl
clip:
  enabled: true
  semantic_path: datasets/clip_semantics/e350_clip_text_v1.json
  legacy_proxy_enabled: true
environment:
  price_bin_count: 301
  price_step_usd: 20.0
  reward_scale_usd: 1000.0
  no_deal_penalty: 0.0
  profit_target_usd: 0.0
  low_profit_penalty: 0.0
  no_deal_requires_positive_margin: true
  invalid_accept_penalty: 0.0
  initial_offer_markup: 1.4
dreamer_reward:
  mode: profit_oriented_v1
tta:
  enabled: false
  mode: belief_shift_v1
  logit_bias_scale: 1.0
  alpha_wtp: 0.45
  alpha_counter: 0.35
  alpha_risk: 0.4
  max_bias_abs: 0.45
  max_price_adjust_usd_per_round: 200.0
dreamer:
  presets:
  - size4m
  jax_platform: gpu
  jax_precision: float32
  envs_amount: 1
  envs_parallel: none
  replay_size: 600000
  batch_size: 8
  batch_length: 32
  train_ratio: 48
  train_fill: 5000
  log_every: 300
  save_every: 5000
train:
  steps: 4000000  # Extended training from the original 2M setting.
  persona_bank_split: train
eval:
  episodes: 5000
  persona_bank_split: val
benchmark:
  episodes: 5000
  persona_bank_split: test
  policies:
  - random
  - concession
  - dreamer
  allow_consumer_mismatch: false

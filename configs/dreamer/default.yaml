schema_version: dreamer_config_v1
defaults:
  run_name: dreamer_e350
  output_root: artifacts/dreamer/runs/run1
paths:
  catalog_path: catalog/e350_core_catalog.yaml
  persona_config_path: configs/personas_v2.yaml
  persona_bank_path: datasets/persona_bank/persona_bank.jsonl
clip:
  enabled: true
  semantic_path: datasets/clip_semantics/e350_clip_text_v1.json
  legacy_proxy_enabled: true
environment:
  price_bin_count: 301
  price_step_usd: 20.0
  reward_scale_usd: 1000.0
  no_deal_penalty: 0  # 0 because sometimes the deal can not makes any profit 
  profit_target_usd: 3000.0  # make the model more profit-seeking
  low_profit_penalty: -0.3
  no_deal_requires_positive_margin: true
  invalid_accept_penalty: -0.2
  initial_offer_markup: 1.6
dreamer_reward:
  mode: profit_oriented_v1
tta:
  enabled: false
  mode: belief_shift_v1
  logit_bias_scale: 1.0
  alpha_wtp: 0.45
  alpha_counter: 0.35
  alpha_risk: 0.4
  max_bias_abs: 0.45
  max_price_adjust_usd_per_round: 200.0
dreamer:
  presets:
  - size1m
  jax_platform: gpu
  jax_precision: float32
  envs_amount: 1
  envs_parallel: none
  replay_size: 300000
  batch_size: 16
  batch_length: 32
  train_ratio: 32.0
  train_fill: 1024
  log_every: 300
  save_every: 5000
train:
  steps: 100000
  persona_bank_split: train
eval:
  episodes: 1000
  persona_bank_split: val
benchmark:
  episodes: 1000
  persona_bank_split: test
  policies:
  - random
  - concession
  - dreamer
  allow_consumer_mismatch: false
